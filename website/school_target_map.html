<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: 'Pretendard', sans-serif;
}

#map {
  width: 65%;
}

/* 사이드바 */
#sidebar {
  width: 35%;
  padding: 20px;
  background: #f8fafc;
  overflow-y: auto;
  border-left: 1px solid #ddd;
}

/* 필터 버튼 */
.filter button {
  margin-right: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #e5e7eb;
  cursor: pointer;
  font-weight: 500;
}

/* 전체 */
.filter button:nth-child(1).active {
  background: #6b7280;
  color: white;
}

/* 고등 */
.filter button:nth-child(2).active {
  background: #3b82f6;
  color: white;
}

/* 중등 */
.filter button:nth-child(3).active {
  background: #f59e0b;
  color: white;
}

/* 초등 */
.filter button:nth-child(4).active {
  background: #10b981;
  color: white;
}

/* 리스트 */
.school {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

/* ✅ hover 색상 (타입별) */
.school.high:hover {
  background: #dbeafe;
}

.school.middle:hover {
  background: #fef3c7;
}

.school.elementary:hover {
  background: #d1fae5;
}

.reason {
  font-size: 13px;
  font-weight: bold;
}

/* 타입별 색상 */
.school.high .reason {
  color: #3b82f6;   /* 파랑 */
}

.school.middle .reason {
  color: #f59e0b;   /* 노랑 */
}

.school.elementary .reason {
  color: #10b981;   /* 초록 */
}

/* 상세 */
.detail {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

button.back {
  margin-bottom: 10px;
  padding: 6px 10px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
}

/* 지도 라벨 */
.label {
  background: rgba(255,255,255,0.9);
  border: none;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  color: #111;
}
</style>
</head>

    name:"창체 중심 수업 운영에 적합",
    type:"초등학교",
    lat:37.4720, lng:126.9397,
    reason:"신도시 디지털 교육 환경",
    address:"[08839]서울 관악구 신림로 114 (신림동, 서울신성초등학교)",
    phone:"02-875-7611",
    email: " ",
    site:"https://sss.sen.es.kr/"
  },

];








let currentFilter = "전체";
let markers = [];

// 필터
function setFilter(type) {
  currentFilter = type;

  document.querySelectorAll(".filter button").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText === type) btn.classList.add("active");
  });

  // ✅ 빠른 줌 아웃
  map.flyTo([defaultView.lat, defaultView.lng], defaultView.zoom, {
    duration: 0.7
  });

  renderList();
  renderMarkers();
}

// 리스트
function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  schools
    .filter(s => currentFilter==="전체" || s.type===currentFilter)
    .forEach(s=>{
      const div = document.createElement("div");

      // ✅ 타입별 클래스 추가
      div.className = "school " + (
        s.type==="고등학교" ? "high" :
        s.type==="중학교" ? "middle" : "elementary"
      );

      div.innerHTML = `
        <b>[${s.type}] ${s.name}</b>
        <div class="reason">${s.reason}</div>
      `;
      div.onclick = ()=>showDetail(s);
      list.appendChild(div);
    });
}

// 상세
function showDetail(s) {
  map.flyTo([s.lat, s.lng], 14, { duration: 0.8 });

  document.getElementById("sidebar").innerHTML = `
    <button class="back" onclick="goBack()">← 뒤로</button>

    <div class="detail">
      <h2>${s.name}</h2>

      <p><b>구분:</b> ${s.type}</p>
      <p><b>주소:</b> ${s.address}</p>
      <p><b>전화:</b> ${s.phone}</p>

     ${s.email ? `<p><b>이메일:</b> ${s.email}</p>` : ""}



${s.newsletter ? `
  <p>
    <b>📰 관련기사:</b>
    <a href="${s.newsletterlink}" target="_blank"
       style="
         color:#2563eb;
         font-weight:600;
         text-decoration:none;
       "
       onmouseover="this.style.textDecoration='underline'"
       onmouseout="this.style.textDecoration='none'">
      ${s.newsletter}
    </a>
  </p>
` : ""}




      <p><b>학교사이트:</b> 
        <a href="${s.site}" target="_blank">${s.site}</a>
      </p>

      <div style="
  margin-top:12px;
  padding:12px;
  background:#eef2ff;
  border-left:4px solid #4f46e5;
  border-radius:8px;
">
  <b>📌 선택 이유</b>
  <div style="margin-top:6px; font-weight:600; color:#1f2937;">
    ${s.reason}
  </div>
</div>

      <!-- ✅ 사이트 미리보기 영역 -->
      <div style="margin-top:15px;">
        <b>📌 학교 사이트 미리보기</b>
        <div style="
          margin-top:8px;
          border:1px solid #ddd;
          border-radius:10px;
          overflow:hidden;
          height:300px;
        ">
          <iframe 
            src="${s.site}"
            style="width:100%; height:100%; border:none;">
          </iframe>
        </div>

        <p style="font-size:12px; color:gray; margin-top:6px;">
          ※ 일부 사이트는 보안 정책으로 표시되지 않을 수 있습니다.
        </p>
      </div>

    </div>
  `;
}




// 뒤로
function goBack() {

  // ✅ 지도 줌 아웃 (기본 위치로)
  map.flyTo([defaultView.lat, defaultView.lng], defaultView.zoom, {
    duration: 0.8
  });

  document.getElementById("sidebar").innerHTML = `
    <h2>학교 리스트</h2>
    <div class="filter">
      <button onclick="setFilter('전체')" class="active">전체</button>
      <button onclick="setFilter('고등학교')">고등학교</button>
      <button onclick="setFilter('중학교')">중학교</button>
      <button onclick="setFilter('초등학교')">초등학교</button>
    </div>
    <div id="list"></div>
  `;

  renderList();
}

// 마커
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  schools
    .filter(s => currentFilter==="전체" || s.type===currentFilter)
    .forEach(s=>{
      let color =
        s.type==="고등학교" ? "blue" :
        s.type==="중학교" ? "orange" : "green";

      const marker = L.circleMarker([s.lat, s.lng], {
        radius: 8,
        color: color,
        fillOpacity: 0.8
      }).addTo(map);

      // 라벨
      marker.bindTooltip(s.name, {
        permanent: true,
        direction: 'top',
        offset: [0, -10],
        className: 'label'
      });

      marker.on('click', ()=>showDetail(s));

      markers.push(marker);
    });
}

// 초기 실행
renderList();
renderMarkers();

</script>

</body>
</html>
